<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">

<style>
body{
    font-family: Arial, Helvetica, sans-serif;
    background: linear-gradient(135deg,#0a1a3c,#0a1a3c);
    margin:0;
    padding:20px;
}

.container{
    max-width:400px;
    margin:auto;
    background:white;
    padding:30px;
    border-radius:10px;
    box-shadow:0 10px 25px rgba(0,0,0,0.2);
}

/* foco */
input:focus{
border-color:#4CAF50;
outline:none;
}

/* erro */
input.erro{
border-color:#ff4d4d;
background:#ffe6e6;
}

.imagem-circular {
    width: 60px;
    height: 60px;
    border-radius: 50%;
    object-fit: cover;
    display:block;
    margin:auto;
}

h3{
    text-align:center;
    color:#5a2d0c;
    margin-bottom:25px;
}

.form-group{
    margin-bottom:15px;
    display:flex;
    flex-direction:column;
}

input, textarea{
padding:12px;
border:1px solid #ccc;
border-radius:5px;
font-size:14px;
width:auto;
text-align:left;
}

input:focus{
    border-color:#ff7a00;
    outline:none;
}

button{
    margin-top:20px;
    width:100%;
    padding:14px;
    border:none;
    border-radius:8px;
    font-size:18px;
    background:linear-gradient(90deg,#0a1a3c,#0a1a3c);
    color:white;
    cursor:pointer;
}

button:hover{
    opacity:0.9;
}

p{
    text-align:center;
    margin-top:10px;
}

p a{
    color:#0a1a3c;
    text-decoration:none;
    font-weight:bold;
}

p a:hover{
    text-decoration:underline;
}

.toast {
    position: fixed;
    top: 10%;
    left: 50%;
    transform: translate(-50%, -50%) scale(0.9);

    min-width: 300px;
    padding: 15px 20px;
    border-radius: 12px;
    color: #fff;
    text-align: center;

    backdrop-filter: blur(10px);
    background: rgba(0, 0, 0, 0.4);
    border: 1px solid rgba(255,255,255,0.2);

    opacity: 0;
    transition: all 0.3s ease;
}

/* Estado visível */
.toast.show {
    opacity: 1;
    transform: translate(-50%, -50%) scale(1);
}

.toast.sucesso{
  background: rgba(0, 0, 0, 0.4);;
}

.toast.erro{
  background: rgba(0, 0, 0, 0.4);;
}
</style>
</head>

<form action="registar.php" method="post" autocomplete="off">
<div class="form-group">
    <label>Nome</label>
    <input type="text" name="nome" placeholder="Nome completo" required autocomplete="off">
</div>

<div class="form-group">
    <label>Email</label>
    <input type="email" name="email" placeholder="Email" required autocomplete="off">
</div>

<div class="form-group">
    <label>Senha</label>
    <input type="password" name="senha" placeholder="Senha" required autocomplete="new-password">
</div>

    <button type="submit" value="Registrar">Criar Admin</button>

      <p>Já possui conta? <a href="login.html">Entrar</a></p>

</form>
</div>
</body>
<script>
// TOAST
function mostrarToast(msg, tipo="sucesso"){
  let toast = document.getElementById("toast");

  if(!toast){
    toast = document.createElement("div");
    toast.id = "toast";
    document.body.appendChild(toast);
  }

  toast.innerText = msg;
  toast.className = "toast show " + tipo;

  setTimeout(()=>{
    toast.classList.remove("show");
  },3000);
}


// SUBMIT REGISTO
document.querySelector("form").addEventListener("submit", function(e){
  e.preventDefault();

  let form = this;
  let dados = new FormData(form);

  mostrarToast("Processando...", "sucesso");

  fetch("registar.php", {
    method: "POST",
    body: dados
  })
  .then(res => res.json())
  .then(data => {

    if(data.status === "sucesso"){
      mostrarToast(data.msg, "sucesso");
      form.reset();

      // opcional: redirecionar depois
      setTimeout(()=>{
        window.location.href = "login.html";
      },1500);

    } else {
      mostrarToast(data.msg, "erro");
    }

  })
  .catch(()=>{
    mostrarToast("Erro de conexão com servidor", "erro");
  });
});
</script>

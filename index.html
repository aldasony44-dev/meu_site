<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Formulário de Inscrição</title>

<style>

body{
font-family: Arial, Helvetica, sans-serif;
background: linear-gradient(135deg,#0a1a3c,#0a1a3c);
margin:0;
padding:20px;
}

.container{
max-width:900px;
margin:auto;
background:white;
padding:30px;
border-radius:10px;
box-shadow:0 10px 25px rgba(0,0,0,0.2);
}
  
.imagem-circular {
        width: 60px;          /* Tamanho da imagem */
        height: 60px;         /* Mesmo valor para largura e altura */
        border-radius: 50%;    /* Transforma em círculo */
        object-fit: cover;     /* Preenche o círculo sem distorcer */
        }

h3{
text-align:center;
color:#5a2d0c;
margin-bottom:25px;
}

.form-group{
margin-bottom:15px;
display:flex;
flex-direction:column;
}

.row{
display:flex;
gap:10px;
flex-wrap:wrap;
}

.row .form-group{
flex:1;
}

input, textarea{
padding:12px;
border:1px solid #ccc;
border-radius:5px;
font-size:14px;
width:auto;
text-align:left;
}
  
.linha-dupla{
    display: flex;
    gap: 10px;
}

.linha-dupla .campo{
    flex: 1;
}

.linha-dupla select{
    width: 100%;
    padding: 12px;
    border-radius: 8px;
    border: 1px solid #ccc;
}
  
select{
padding:12px;
border:1px solid #ccc;
border-radius:5px;
font-size:14px;
width:50%;
}

input:focus, select:focus{
border-color:#060f8f;
outline:none;
}

.upload-box{
border:2px dashed #ccc;
padding:15px;
text-align:center;
border-radius:6px;
background:#fafafa;
}

.preview img{
max-width:100%;
margin-top:10px;
border-radius:6px;
}

p{
    text-align:center;
    margin-top:10px;
}

p a{
    color:#0a1a3c;
    text-decoration:none;
    font-weight:bold;
}

.modal{
  position: fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background: rgba(0,0,0,0.6);
  display:none;
  justify-content:center;
  align-items:center;
  z-index:9999;
}

.modal-box{
  background:white;
  padding:30px;
  border-radius:15px;
  text-align:center;
  width:300px;
  animation: zoom 0.4s ease;
}

@keyframes zoom{
  from{ transform:scale(0.7); opacity:0; }
  to{ transform:scale(1); opacity:1; }
}

.check{
  font-size:50px;
  color:rgb(93, 128, 241);
  margin-bottom:10px;
}

.modal-box button{
  margin-top:15px;
  padding:10px 20px;
  border:none;
  border-radius:6px;
  background:rgb(86, 120, 233);
  color:white;
  cursor:pointer;
}

/* foco */
input:focus{
border-color:rgb(45, 87, 224);
outline:none;
}

/* erro */
input.erro{
border-color:#ff4d4d;
background:#ffe6e6;
}

button{
margin-top:20px;
width:100%;
padding:14px;
border:none;
border-radius:8px;
font-size:18px;
background:linear-gradient(90deg,#0a1a3c,#0a1a3c);
color:white;
cursor:pointer;
}

button:hover{
opacity:0.9;
}

@media(max-width:600px){
.row{
flex-direction:column;
}
}

</style>
</head>

/* TOAST (notificação flutuante) */
.toast{
  position: fixed;
  top:10px;
  left:50px;
  min-width: 300px;
    padding: 15px 20px;
    border-radius: 12px;
    color: #fff;
    text-align: center;

    backdrop-filter: blur(10px);
    background: rgba(0, 0, 0, 0.4);
    border: 1px solid rgba(255,255,255,0.2);

    opacity: 0;
    transition: all 0.3s ease;
}

.toast.show{
  opacity:1;
  transform:translateY(0);
}

.toast.sucesso{ background:rgb(93, 94, 97)}
.toast.erro{ background:#ff4d4d; }
</style>

<script>

// TOAST
function mostrarToast(msg, tipo="sucesso"){
  let toast = document.getElementById("toast");
  toast.innerText = msg;
  toast.className = "toast show " + tipo;

  setTimeout(()=>{
    toast.classList.remove("show");
  }, 3000);
}


// MODAL
function abrirModal(msg){
  document.getElementById("mensagemSucesso").innerText = msg;
  document.getElementById("successModal").style.display = "flex";
}

function fecharModal(){
  document.getElementById("successModal").style.display = "none";
}


// PREVIEW IMAGEM
function preview(event,id){
  let file = event.target.files[0];
  if(!file) return;

  let reader = new FileReader();

  reader.onload = function(){
    document.getElementById(id).innerHTML =
      `<img src="${reader.result}">`;
  }

  reader.readAsDataURL(file);
}


// ENVIO DO FORMULÁRIO COM AJAX
document.getElementById("form").addEventListener("submit", function(e){
  e.preventDefault();

  let form = this;
  let dados = new FormData(form);

  mostrarToast("Enviando dados...", "sucesso");

  fetch("salvar.php", {
    method:"POST",
    body:dados
  })
  .then(res => res.text())
  .then(resposta => {

    if(resposta.includes("sucesso")){
      mostrarToast("Inscrição realizada com sucesso!", "sucesso");
      abrirModal("Sua candidatura foi enviada com sucesso");

      form.reset();
      document.querySelectorAll(".preview").forEach(el => el.innerHTML="");

    }else{
      mostrarToast("❌ Algo deu errado!", "erro");
    }

  })
  .catch(()=>{
    mostrarToast("⚠️ Erro de conexão com o servidor!", "erro");
  });

});
</script>
